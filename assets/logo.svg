<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="gradBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Icon Gradient -->
    <linearGradient id="gradIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="60" cy="60" r="55" fill="url(#gradBg)" />

  <!-- Animated W -->
  <path d="M30 75 L40 45 L50 75 L60 45 L70 75"
        stroke="url(#gradIcon)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#glow)">

    <!-- Drawing animation -->
    <animate attributeName="stroke-dasharray"
             from="0,200"
             to="200,0"
             dur="1.5s"
             fill="freeze" />
  </path>

  <!-- Glowing Dot -->
  <circle cx="75" cy="45" r="5" fill="white" filter="url(#glow)">
    <animate attributeName="r"
             values="4;6;4"
             dur="1.2s"
             repeatCount="indefinite"/>
  </circle>

</svg>